<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-Astro Driver Test Portal</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            margin-bottom: 2rem;
            color: #ef4444;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            width: 100%;
            max-width: 800px;
            padding: 1rem;
        }
        .card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.75rem;
            padding: 1.5rem;
            text-align: center;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s;
            cursor: pointer;
        }
        .card:hover {
            border-color: #ef4444;
            transform: translateY(-4px);
            background-color: #334155;
        }
        .card h2 {
            margin-top: 0;
            font-size: 1.25rem;
        }
        .card p {
            font-size: 0.875rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <h1>T-Astro Driver Test Portal</h1>
    <div class="container">
        <a href="./index.html" class="card">
            <h2>INDI Driver</h2>
            <p>Original INDI control panel</p>
        </a>
        <a href="./alpaca.html" class="card">
            <h2>ASCOM Alpaca</h2>
            <p>New Alpaca driver interface</p>
        </a>
        <a href="./simulator.html" class="card">
            <h2>Simulator</h2>
            <p>Local simulator driver</p>
        </a>
    </div>
</body>
</html>
